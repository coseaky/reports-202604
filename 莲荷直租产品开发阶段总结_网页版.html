> 本文档梳理莲荷直租平台（原蜜租X）自2025年5月至2026年4月的产品迭代、业务演进与关键决策，呈现平台从起步到品牌升级的完整发展路径。

## 一、产品概况

### 1.1 品牌演变

| 阶段 | 时间 | 说明 |
|------|------|------|
| 双端并行 | 2025.05 - 2026.01 | 租客端（蜜租X）与运营端（蜜租X运营端）独立运营 |
| 合并决策 | 2026.01.14 | 为集中开发资源、提升用户体验，决定合并为单一小程序 |
| 品牌升级 | 2026.03.11 | 莲荷直租 V2.0.0 正式上线，完成双端合并，同步更新品牌标识 |

### 1.2 平台角色体系

| 角色 | 入驻方式 | 核心功能 |
|------|---------|---------|
| 租客 | 小程序注册 | 找房、签约、支付账单 |
| 房东 | 线上签约入驻 | 提供房源，签订联合租房东合同，接收分账 |
| 装修投资人 | 线上签约入驻 | 签订联合租投资人合同，接收分账 |
| 推荐人 | 自助入驻 | 带看成交获取佣金，接收分账 |
| 管家 | 平台后台设置 | 代表平台与房东、投资人签约，管理房源与合同 |
| 平台 | — | 收取技术服务费（3%） |

**关键设计：** 支持单用户多角色权限叠加，例如房东可同时担任投资人。

### 3.2 主体变更流程（解决03-15问题）

1. 公司对公户银行变更名称
2. 易宝变更单盖章
3. 易宝后台提交主体名称变更申请
4. 重新绑定小程序appid
5. 测试支付

### 3.3 押金结算方案

**当前方案：** 押金使用单独子商户号收款，直接结算给房东。退款时，房东支付押金退款账单，根据退租定损情况分账退款。

| 环节 | 规则 |
|------|------|
| **押金收款** | 租客支付 → 押金子商户号收款 → 直接结算给房东 |
| **正常退租** | 管家提交退租 → 房东账单生成 → 房东付款 → 系统退租客 |
| **违约退租** | 管家扣定损后剩余 → 房东账单生成 → 房东付款 → 系统退租客（定损金额分账给管家） |

**商户号分设：** 押金与租金商户号分开，互不影响。

**待优化：** 收款环节手续费可能导致付款余额不足，需等押金池充足时再次支付。

## 七、关键业务规则备忘

| 类别 | 规则 |
|------|------|
| 签约规范 | 企业主体签约需公章+法人/授权代表签字 |
| 推荐人 | 自助入驻，佣金仅首期租金参与 |
| 线上优先 | 全面推行线上签约入驻，避免线下配置出错 |
| 委托协议 | 产权人与签约房东不一致时需先创建授权委托协议 |
| 多角色 | 单用户支持多角色权限叠加 |
| 手动修改 | 管家换手机号/银行卡换绑需技术手动修改 |
| 地址匹配 | 身份证地址模糊匹配算法兼容行政区划变更 |
